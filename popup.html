<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Hider</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        width: 320px;
        background: linear-gradient(180deg, #101827 0%, #0b1220 100%);
        color: #e5eefb;
      }

      .card {
        padding: 16px;
      }

      .title {
        margin: 0 0 6px;
        font-size: 18px;
        font-weight: 700;
      }

      .subtitle {
        margin: 0 0 16px;
        color: #9fb2d1;
        font-size: 12px;
        line-height: 1.5;
      }

      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin: 14px 0;
      }

      .label {
        font-size: 13px;
        color: #d6e2f2;
      }

      .toggle {
        width: 18px;
        height: 18px;
        accent-color: #7c9cff;
      }

      select,
      input[type="range"] {
        width: 100%;
      }

      select {
        margin-top: 6px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.06);
        color: #edf3ff;
        padding: 10px 12px;
        outline: none;
      }

      .hint {
        margin-top: 8px;
        font-size: 11px;
        color: #8ba1c7;
      }

      .range-wrap {
        display: grid;
        gap: 8px;
      }

      .value {
        font-size: 12px;
        color: #b8c7e1;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1 class="title">Email Hider</h1>
      <p class="subtitle">Blur or mask email addresses found on the current page.</p>

      <div class="row">
        <div class="label">Enable protection</div>
        <input id="enabled" class="toggle" type="checkbox" />
      </div>

      <div class="row" style="display:block;">
        <div class="label">Mode</div>
        <select id="mode">
          <option value="blur">Blur</option>
          <option value="hide">Hide</option>
        </select>
      </div>

      <div class="row" style="display:block;">
        <div class="range-wrap">
          <div class="label">Blur strength</div>
          <input id="blurPx" type="range" min="2" max="16" step="1" />
          <div class="value"><span id="blurPxValue"></span> px</div>
        </div>
      </div>

      <div class="hint">Tip: the extension watches dynamic pages too.</div>
    </div>
    <script src="popup/storage.js"></script>
    <script src="popup/ui.js"></script>
    <script src="popup.js"></script>
  </body>
  </html>
