<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ea043;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a7522;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3fb950;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f6feb;stop-opacity:1" />
    </linearGradient>
    <filter id="fblur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" />
    </filter>
  </defs>

  <rect width="512" height="512" fill="none" />
  
  <!-- Sleek Shield -->
  <path d="M256 48 C 160 88, 64 104, 64 104 V 248 C 64 360, 160 432, 256 480 C 352 432, 448 360, 448 248 V 104 C 448 104, 352 88, 256 48 Z" fill="url(#shieldGrad)" />
  
  <!-- Glowing inner edge -->
  <path d="M256 56 C 166 94, 76 110, 76 110 V 246 C 76 350, 166 418, 256 462 C 346 418, 436 350, 436 246 V 110 C 436 110, 346 94, 256 56 Z" fill="none" stroke="#6cd684" stroke-width="6" opacity="0.6"/>

  <!-- @ symbol -->
  <text x="256" y="340" font-family="'Inter', -apple-system, sans-serif" font-weight="800" font-size="240" fill="#ffffff" text-anchor="middle">@</text>

  <!-- Blur Bar -->
  <rect x="150" y="240" width="212" height="60" fill="rgba(255,255,255,0.85)" rx="16" filter="url(#fblur)" />
</svg>
